<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBX Electrical</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
padding:20px;
background:#111;
position:sticky;
top:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

h1{color:#ff3b3b;}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:#1a1a1a;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:8px;
background:#ff1f1f;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.cart{
position:fixed;
right:20px;
top:100px;
width:250px;
background:#1a1a1a;
padding:10px;
border-radius:10px;
max-height:70vh;
overflow:auto;
}

input,select,textarea{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:6px;
}

.request{
margin-top:40px;
background:#1a1a1a;
padding:20px;
border-radius:10px;
}
</style>

</head>

<body>

<header>
<h2>WBX Electrical</h2>
</header>

<div class="container">

<h1>Store</h1>

<div class="products">

<div class="card">
<img src="controller.jpg">
<h3>Controller</h3>
<button onclick="add('Controller',200)">Add</button>
</div>

<div class="card">
<img src="sw900.jpg">
<h3>SW900 Display</h3>
<button onclick="add('SW900',50)">Add</button>
</div>

<div class="card">
<img src="ukc1.jpg">
<h3>UKC1 Display</h3>
<button onclick="add('UKC1',100)">Add</button>
</div>

<div class="card">
<img src="throttle.jpg">
<h3>Throttle</h3>
<button onclick="add('Throttle',25)">Add</button>
</div>

</div>

<!-- CART -->
<div class="cart">
<h3>Cart</h3>
<div id="cart"></div>
</div>

<!-- REQUEST -->
<div class="request">
<h2>Request Parts</h2>

<input id="bike" placeholder="Bike Model">
<input id="voltage" placeholder="Voltage">
<textarea id="parts" placeholder="Requested Parts"></textarea>

<select id="contact">
<option>Email</option>
<option>SMS</option>
<option>Instagram</option>
<option>Snapchat</option>
</select>

<input id="contactInfo" placeholder="Contact Info">

<button onclick="send()">Send Order</button>

</div>

</div>

<script>

let cart = [];

function add(name, price){
cart.push({name, price});
update();
}

function update(){
let c = document.getElementById("cart");
c.innerHTML = "";

cart.forEach(i=>{
c.innerHTML += `<div>${i.name} - $${i.price}</div>`;
});
}

async function send(){

await fetch("https://script.google.com/macros/s/AKfycby9BDz5zPaF3OlzRT4brhnS8_lUMZVhXntkrpACb2lDKt2fmACcol-VzR2BJW5CUu4z/exec", {
method:"POST",
body:new URLSearchParams({
bike:bike.value,
voltage:voltage.value,
parts:parts.value,
contactMethod:contact.value,
contactInfo:contactInfo.value,
cart: JSON.stringify(cart)
})
});

alert("Sent!");
cart=[];
update();
}

</script>

</body>
</html>
