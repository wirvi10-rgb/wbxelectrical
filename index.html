<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WBX Electrical Store</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}

body{background:#0f0f0f;color:white;overflow-x:hidden}

/* HEADER */
header{
position:sticky;top:0;z-index:1000;
display:flex;justify-content:space-between;
padding:20px;background:#111;border-bottom:1px solid #222;
}
.logo{font-size:1.8rem;font-weight:800;color:#ff2d2d}
nav a{color:#ccc;margin-left:20px;text-decoration:none;font-weight:600}
nav a:hover{color:#ff2d2d}

/* HERO */
.hero{
padding:70px 20px;text-align:center;
background:radial-gradient(circle,#2a0000,#0f0f0f);
}
.hero h1{font-size:3rem}
.hero p{color:#bbb;margin-top:10px}

/* CATEGORY */
.categories{
display:flex;flex-wrap:wrap;gap:10px;
justify-content:center;padding:20px;
}
.cat{
padding:10px 15px;background:#1c1c1c;
border:1px solid #333;border-radius:10px;cursor:pointer;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;padding:20px;
}

.product{
background:#161616;padding:10px;border-radius:15px;
cursor:pointer;border:1px solid #222;
transition:.2s;
}
.product:hover{transform:translateY(-3px);border-color:#ff2d2d}
.product img{width:100%;height:140px;object-fit:cover;border-radius:10px}
.product h3{font-size:1rem;margin-top:8px}
.product p{color:#ff4d4d;font-weight:700}

/* CART */
.cart{
position:fixed;right:15px;top:100px;
width:280px;background:#111;
border:1px solid #222;padding:15px;border-radius:15px;
max-height:70vh;overflow:auto;
}
.cart-item{
display:flex;justify-content:space-between;
margin:8px 0;background:#1c1c1c;
padding:8px;border-radius:8px;
}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.7);
display:none;justify-content:center;align-items:center;
}
.modal-content{
background:#151515;padding:20px;border-radius:15px;width:350px;
}
.modal img{width:100%;border-radius:10px}
select,button{
width:100%;padding:10px;margin-top:10px;
border:none;border-radius:10px;
}
button{background:#ff2d2d;color:white;cursor:pointer}

footer{
text-align:center;padding:30px;
color:#777;border-top:1px solid #222;margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">WBX Electrical</div>
<nav>
<a href="#store">Store</a>
<a href="#cart">Cart</a>
</nav>
</header>

<section class="hero">
<h1>WBX Electrical Store</h1>
<p>EBikes • MTB • Dirt Bikes • Conversion Kits</p>
</section>

<div class="categories">
<div class="cat" onclick="filter('all')">All</div>
<div class="cat" onclick="filter('ebike')">E-Bike</div>
<div class="cat" onclick="filter('mtb')">MTB</div>
<div class="cat" onclick="filter('dirt')">Dirt Bike</div>
<div class="cat" onclick="filter('kit')">Kits</div>
</div>

<div class="cart">
<h3>Cart</h3>
<div id="cartItems"></div>
</div>

<section class="products" id="store"></section>

<div class="modal" id="modal">
<div class="modal-content">
<img id="mImg">
<h3 id="mTitle"></h3>
<p id="mPrice"></p>

<select id="option">
<option>Standard</option>
<option>Upgraded</option>
<option>Pro</option>
</select>

<button onclick="addToCart()">Add to Cart</button>
<button onclick="closeModal()" style="background:#333">Close</button>
</div>
</div>

<footer>© 2026 WBX Electrical</footer>

<script>

let cart = JSON.parse(localStorage.getItem("wbx")) || [];
let selected=null;
let currentFilter="all";
let products=[];

/* CLEAN PRODUCT LIST (NO NUMBERS) */
const base = [
["Controller 30A",200,"ebike"],
["Controller 45A",260,"ebike"],
["E-Bike Display SW900",80,"ebike"],
["E-Bike Display UKC1",90,"ebike"],
["Thumb Throttle",40,"ebike"],
["Brake Sensor Kit",50,"ebike"],
["PAS Sensor",40,"ebike"],
["Torque Arm Heavy Duty",25,"ebike"],
["Battery Mount Plate",35,"ebike"],
["DC Converter 12V",40,"ebike"],

["48V E-Bike Battery",600,"ebike","battery.jpg"],
["52V E-Bike Battery",700,"ebike","battery.jpg"],
["72V E-Bike Battery",900,"ebike","battery.jpg"],
["BMS Protection Board",80,"ebike"],
["XT60 Connector Set",20,"ebike"],
["Waterproof Wiring Kit",25,"ebike"],
["Fuse Protection Kit",20,"ebike"],
["Battery Carry Bag XL",35,"ebike"],
["Power Switch Key",30,"ebike"],
["Voltage Display Meter",20,"ebike"],

["MTB Hydraulic Brake Set",120,"mtb"],
["MTB Brake Pads Premium",25,"mtb"],
["MTB Chain 11 Speed",35,"mtb"],
["MTB Cassette 12 Speed",60,"mtb"],
["MTB Derailleur Shimano",80,"mtb"],
["MTB Crankset Alloy",70,"mtb"],
["MTB Suspension Fork Air",250,"mtb"],
["MTB Tire Set Maxxis Style",90,"mtb"],
["MTB Pedals Alloy",30,"mtb"],
["MTB Handlebar Carbon",45,"mtb"],

["Dirt Bike Chain Heavy Duty",50,"dirt"],
["Dirt Bike Sprocket Kit",60,"dirt"],
["Dirt Bike Brake Kit Pro",150,"dirt"],
["Dirt Bike Carburetor Kit",90,"dirt"],
["Dirt Bike Exhaust Performance",180,"dirt"],
["Dirt Bike Clutch Kit",120,"dirt"],
["Dirt Bike Tire Set Knobby",110,"dirt"],
["Dirt Bike Grip Set Soft",25,"dirt"],
["Dirt Bike Fork Seal Kit",40,"dirt"],
["Dirt Bike Air Filter Foam",25,"dirt"],

["Mid Drive Conversion Kit",1100,"kit"],
["Hub Motor for Conversion Kit",400,"kit"],
["Full E-Bike Wiring Kit",60,"kit"],
["Torque Arm Kit Heavy",35,"kit"],
["Complete E-Bike Conversion Kit",1050,"kit"],
["Rear Hub Motor 1500W",500,"kit"],
["Front Hub Motor 1000W",400,"kit"],
["Controller Kit Combo 72V",900,"kit"],
["Throttle Kit Universal",90,"kit"],
["Display Kit Advanced",70,"kit"]
];

/* EXPAND TO 120 PRODUCTS (NO NUMBERS) */
for(let i=0;i<120;i++){
let b = base[i % base.length];
products.push({
id: i,
name: b[0],
price: b[1],
cat: b[2],
img: b[3] || "placeholder.jpg"
});

function render(){
let store=document.getElementById("store");
store.innerHTML="";

products
.filter(p=>currentFilter==="all"||p.cat===currentFilter)
.forEach(p=>{
store.innerHTML+=`
<div class="product" onclick="openModal(${p.id})">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.price}</p>
</div>`;
});
}

function filter(c){currentFilter=c;render()}

function openModal(id){
selected=products.find(p=>p.id===id);
document.getElementById("mTitle").innerText=selected.name;
document.getElementById("mPrice").innerText="$"+selected.price;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function addToCart(){
cart.push({
name:selected.name,
price:selected.price,
option:document.getElementById("option").value
});
localStorage.setItem("wbx",JSON.stringify(cart));
updateCart();
closeModal();
}

function updateCart(){
let box=document.getElementById("cartItems");
box.innerHTML="";
cart.forEach(c=>{
box.innerHTML+=`
<div class="cart-item">
<div>${c.name} (${c.option})</div>
<div>$${c.price}</div>
</div>`;
});
}

render();
updateCart();

</script>

</body>
</html>
